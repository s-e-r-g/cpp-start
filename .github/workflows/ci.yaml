name: CI (CMake • GCC/Clang/MSVC)

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build:
    name: ${{ matrix.os }} • ${{ matrix.compiler }} • Release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - os: ubuntu-latest
            compiler: gcc
            cc: gcc
            cxx: g++
          - os: ubuntu-latest
            compiler: clang
            cc: clang
            cxx: clang++
          # Windows
          - os: windows-latest
            compiler: msvc
          - os: windows-latest
            compiler: clang-cl
            cc: clang-cl
            cxx: clang-cl
          # macOS
          - os: macos-latest
            compiler: clang
            cc: clang
            cxx: clang++

    env:
      CMAKE_BUILD_TYPE: Release
      CTEST_OUTPUT_ON_FAILURE: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ---- Platform tool setup ------------------------------------------------

      - name: Install build tools (Ubuntu)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build $([[ "${{ matrix.compiler }}" == "gcc" ]] && echo "gcc g++" || echo "clang")

      - name: Install Ninja (macOS)
        if: startsWith(matrix.os, 'macos')
        run: |
          brew update
          brew install ninja || true

      - name: Enable MSVC environment (Windows)
        if: startsWith(matrix.os, 'windows')
        uses: ilammy/msvc-dev-cmd@v1

      # ---- Configure & Build --------------------------------------------------

      - name: Configure (CMake + Ninja)
        shell: bash
        run: |
          # For MSVC on Windows, let CMake find cl.exe by itself (don't set CC/CXX).
          # For clang-cl (MSVC-compatible Clang), explicitly set compilers to clang-cl.
          if [[ "${{ matrix.os }}" == "windows-latest" && "${{ matrix.compiler }}" == "clang-cl" ]]; then
            cmake -S . -B build -G Ninja \
              -DCMAKE_C_COMPILER=clang-cl \
              -DCMAKE_CXX_COMPILER=clang-cl \
              -DCMAKE_BUILD_TYPE="${CMAKE_BUILD_TYPE}"
          else
            # Non-MSVC (gcc/clang) or MSVC without explicit compilers.
            if [[ -n "${{ matrix.cc }}" ]]; then export CC=${{ matrix.cc }}; fi
            if [[ -n "${{ matrix.cxx }}" ]]; then export CXX=${{ matrix.cxx }}; fi
            cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE="${CMAKE_BUILD_TYPE}"
          fi

      - name: Build
        shell: bash
        run: cmake --build build --config "${CMAKE_BUILD_TYPE}" -- -v

      - name: Test (ctest)
        shell: bash
        working-directory: build
        run: ctest -C "${CMAKE_BUILD_TYPE}" --output-on-failure
